name: gluetun-webui

services:
  gluetun-webui:
    image: scuzza/gluetun-webui:latest
    container_name: gluetun-webui
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # -----------------------------------------------------------------------
      # Single-instance setup (legacy / default) – point to one gluetun container
      # -----------------------------------------------------------------------
      - GLUETUN_CONTROL_URL=http://gluetun:8000

      # Uncomment ONE of the auth options below if Gluetun has auth enabled:
      # Bearer token (HTTP_CONTROL_SERVER_AUTH=apikey:yourtoken in gluetun)
      #- GLUETUN_API_KEY=yourtoken

      # HTTP Basic auth (HTTP_CONTROL_SERVER_AUTH=username:password in gluetun)
      #- GLUETUN_USER=username
      #- GLUETUN_PASSWORD=password

      # -----------------------------------------------------------------------
      # Multi-instance setup – define two or more gluetun instances.
      # When ANY GLUETUN_N_URL is set the single-instance vars above are ignored.
      # Each instance can have its own optional display name and auth credentials.
      # -----------------------------------------------------------------------
      #- GLUETUN_1_NAME=Home VPN
      #- GLUETUN_1_URL=http://gluetun1:8000
      #- GLUETUN_1_API_KEY=token1          # or GLUETUN_1_USER / GLUETUN_1_PASSWORD

      #- GLUETUN_2_NAME=Work VPN
      #- GLUETUN_2_URL=http://gluetun2:8000
      #- GLUETUN_2_API_KEY=token2

      #- GLUETUN_3_NAME=Media VPN
      #- GLUETUN_3_URL=http://gluetun3:8000
      # (no auth needed for instance 3)
    
    networks:
      - ext-network
    
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  ext-network:
    external: true
    name: your_network_name  # ← Change this to match your existing Docker network
